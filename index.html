<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milano — La Selezione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0d0b;
  --bg-card: #15140f;
  --bg-elev: #1c1a14;
  --ink: #f4ede0;
  --ink-soft: #c8bfae;
  --ink-dim: #8a8270;
  --gold: #c9a96a;
  --gold-soft: #8a7a4f;
  --line: rgba(201, 169, 106, 0.18);
  --line-strong: rgba(201, 169, 106, 0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Manrope', sans-serif;
  font-weight: 300;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(201, 169, 106, 0.08), transparent 50%),
    radial-gradient(circle at 80% 90%, rgba(201, 169, 106, 0.05), transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* ——— HEADER ——— */
header {
  text-align: center;
  padding: 32px 0 56px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 56px;
}

.eyebrow {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  letter-spacing: 0.45em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 18px;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  font-size: clamp(48px, 9vw, 92px);
  line-height: 0.95;
  letter-spacing: -0.01em;
  color: var(--ink);
}

h1 em {
  font-style: italic;
  color: var(--gold);
  font-weight: 400;
}

.tagline {
  margin-top: 18px;
  font-size: 14px;
  color: var(--ink-dim);
  letter-spacing: 0.08em;
}

/* ——— CATEGORIE ——— */
.category {
  margin-bottom: 56px;
}

.category-head {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
}

.cat-num {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--gold);
  font-weight: 500;
}

.cat-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 500;
  letter-spacing: 0.02em;
  flex: 1;
}

.cat-line {
  flex: 1;
  height: 1px;
  background: var(--line-strong);
  align-self: center;
}

/* ——— CARDS ——— */
.cards {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
}

@media (min-width: 720px) {
  .cards { grid-template-columns: 1fr 1fr; }
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  padding: 22px 22px 20px;
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
  background: var(--gold);
  transform: scaleY(0);
  transform-origin: top;
  transition: transform 0.4s ease;
}

.card:hover, .card:active {
  background: var(--bg-elev);
  border-color: var(--line-strong);
  transform: translateY(-2px);
}

.card:hover::before, .card:active::before {
  transform: scaleY(1);
}

.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 0.01em;
  margin-bottom: 6px;
  color: var(--ink);
}

.card-zone {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}

.card-desc {
  font-size: 14px;
  color: var(--ink-soft);
  line-height: 1.6;
}

.card-arrow {
  margin-top: 16px;
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--ink-dim);
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-arrow::after {
  content: '→';
  transition: transform 0.3s ease;
}

.card:hover .card-arrow::after {
  transform: translateX(4px);
  color: var(--gold);
}

/* ——— MODAL ——— */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 7, 5, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  max-width: 640px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  padding: 32px 24px 28px;
  position: relative;
  transform: translateY(30px);
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

@media (min-width: 720px) {
  .modal { padding: 40px 44px 36px; }
}

.modal-overlay.open .modal {
  transform: translateY(0);
}

.modal::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  width: 36px;
  height: 36px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
}

.modal-close:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.modal-cat {
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
  margin-top: 8px;
}

.modal-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 6vw, 44px);
  font-weight: 500;
  line-height: 1.05;
  margin-bottom: 8px;
  letter-spacing: -0.005em;
}

.modal-name em {
  font-style: italic;
  color: var(--gold);
  font-weight: 400;
}

.modal-tagline {
  font-style: italic;
  color: var(--ink-dim);
  font-size: 15px;
  margin-bottom: 24px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  border-bottom: 1px solid var(--line);
  padding-bottom: 18px;
}

.modal-section {
  margin-bottom: 18px;
}

.modal-label {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: var(--gold-soft);
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 500;
}

.modal-value {
  font-size: 15px;
  color: var(--ink);
  line-height: 1.6;
}

.modal-value strong {
  color: var(--ink);
  font-weight: 600;
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}

.tag {
  font-size: 11px;
  padding: 4px 10px;
  border: 1px solid var(--line);
  color: var(--ink-soft);
  letter-spacing: 0.05em;
}

/* ——— FOOTER ——— */
footer {
  margin-top: 80px;
  padding-top: 32px;
  border-top: 1px solid var(--line);
  text-align: center;
  color: var(--ink-dim);
  font-size: 12px;
  letter-spacing: 0.15em;
}

footer em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--gold);
  font-size: 14px;
  display: block;
  margin-bottom: 8px;
  letter-spacing: 0;
}

/* Stop body scroll when modal open */
body.no-scroll { overflow: hidden; }
</style>

// Render
const container = document.getElementById('categories');
data.forEach((cat, ci) => {
  const section = document.createElement('section');
  section.className = 'category';
  section.innerHTML = `
    <div class="category-head">
      <span class="cat-num">${cat.number}.</span>
      <span class="cat-title">${cat.category}</span>
      <span class="cat-line"></span>
    </div>
    <div class="cards" id="cards-${ci}"></div>
  `;
  container.appendChild(section);

  const cardsDiv = section.querySelector(`#cards-${ci}`);
  cat.restaurants.forEach((r, ri) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(ci, ri);
    card.innerHTML = `
      <div class="card-name">${r.name}</div>
      <div class="card-zone">${r.zone}</div>
      <div class="card-desc">${r.shortDesc}</div>
      <div class="card-arrow">Scopri</div>
    `;
    cardsDiv.appendChild(card);
  });
});

function openModal(ci, ri) {
  const r = data[ci].restaurants[ri];
  const cat = data[ci].category;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-cat">${cat} · ${r.subtitle}</div>
    <div class="modal-name">${r.name}</div>
    <div class="modal-tagline">"${r.tagline}"</div>

    <div class="modal-section">
      <div class="modal-label">Cucina</div>
      <div class="modal-value">${r.cuisine}</div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Dove</div>
      <div class="modal-value">${r.address}</div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Atmosfera</div>
      <div class="modal-value">${r.atmosphere}</div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Da non perdere</div>
      <div class="modal-value">${r.specialties}</div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Fascia di prezzo</div>
      <div class="modal-value"><strong>${r.price}</strong></div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Quando andarci</div>
      <div class="modal-value">${r.when}</div>
    </div>

    <div class="modal-section">
      <div class="modal-label">Note</div>
      <div class="tags">${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
  document.body.classList.add('no-scroll');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.classList.remove('no-scroll');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});
</script>
